name: Dependabot auto-merge

# Auto-merge Dependabot updates once CI passes. Only the `github-actions`
# ecosystem is watched here (Julia deps go through CompatHelper), and those
# actions are SHA-pinned, so the residual risk is a freshly-published malicious
# release — the `cooldown` in dependabot.yml holds updates for 7 days before
# a PR is even opened, and CI must pass before the merge fires. Patch and minor
# bumps merge automatically; major bumps are left for a manual merge.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      - name: Enable auto-merge for patch and minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
