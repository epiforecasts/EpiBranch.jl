name: CompatHelper
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  CompatHelper:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - run: |
          import Pkg
          Pkg.add("CompatHelper")
          using CompatHelper
          CompatHelper.main()
        shell: julia {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPATHELPER_PRIV: ''
