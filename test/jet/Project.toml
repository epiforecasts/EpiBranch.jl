[deps]
EpiBranch = "d1aa5d78-c683-4158-9743-7109392647a5"
JET = "c3a54625-cd67-489e-a8e7-0a5a0ff4e31b"
LoweredCodeUtils = "6f1432cf-f94c-5a45-995e-cdbf5db27b0b"

# LoweredCodeUtils 3.6 drops the `add_active_gotos!` arity JET 0.11 calls, so a
# fresh resolve (CI keeps no manifest here) picks an incompatible pair and JET
# fails to precompile on the latest Julia. Exclude only 3.6+; the range still
# allows the 3.0.x that JET needs on the LTS Julia. Drop once JET supports 3.6.
[compat]
LoweredCodeUtils = "3.0 - 3.5"
